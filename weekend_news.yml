name: Weekend Economic News Automation

on:
  schedule:
    # 08:30 KST (UTC+9) -> 23:30 (Previous day) UTC
    # Saturday 08:30 KST = Friday 23:30 UTC
    # Sunday 08:30 KST = Saturday 23:30 UTC
    - cron: '30 23 * * 5,6'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  run-news-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run news generation script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python cloud_daily_news.py
