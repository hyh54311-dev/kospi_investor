name: KOSPI Index & Investor Daily Tracker

on:
  schedule:
    # 10:30 AM KST is 01:30 AM UTC
    - cron: '30 1 * * 1-5'
    # 15:30 PM KST is 06:30 AM UTC
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # Allows manual runs from GitHub UI

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4 lxml python-dotenv

      - name: Run Python Tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          GAS_PROXY_URL: "" # Keep empty to enforce Direct Mode in GitHub Actions environment
        run: python kospi_investor_tracker.py
